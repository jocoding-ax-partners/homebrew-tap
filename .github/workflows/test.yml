name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Audit formula
        run: |
          for f in Formula/*.rb; do
            echo "::group::Audit $f"
            /usr/bin/ruby -c "$f"
            /opt/homebrew/bin/brew audit --formula "$f"
            echo "::endgroup::"
          done
      - name: Verify formula URLs and sha256 against CDN checksums
        run: |
          ruby <<'RUBY'
          formula = File.read("Formula/axhub.rb")
          version = formula[/version "([^"]+)"/, 1] or abort("missing formula version")
          checksums = `curl -fsSL https://cli.jocodingax.ai/#{version}/checksums.txt`
          abort("failed to fetch checksums") if checksums.empty?
          checksum_map = checksums.lines.each_with_object({}) do |line, acc|
            sha, file = line.split(/\s+/, 2)
            next unless sha && file
            acc[file.strip] = sha
          end
          entries = formula.scan(/url "([^"]+)"\s+sha256 "([^"]+)"/m)
          abort("no formula entries found") if entries.empty?
          entries.each do |url, sha|
            file = File.basename(url)
            expected = checksum_map.fetch(file)
            abort("sha mismatch for #{file}: #{sha} != #{expected}") unless sha == expected
            system("curl", "-fsI", url) or abort("unreachable url: #{url}")
          end
          RUBY
